name: sales_frontend
description: "Sales & Inventory Management System - Desktop Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  syncfusion_flutter_charts: ^27.2.5
  file_picker: ^10.3.10
  data_table_2: ^2.5.10
  socket_io_client: ^2.0.3+1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  pdf: ^3.11.3
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/images/logo.png"
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/loader.gif
    - assets/images/background_login.png
